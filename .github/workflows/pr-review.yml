name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      language:
        description: 'Tech stack del proyecto (auto-detect si se omite)'
        required: false
        type: string
        default: 'auto'

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  detect_stack:
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect tech stack
        id: detect
        run: |
          INPUT="${{ inputs.language }}"
          if [ "$INPUT" != "auto" ]; then
            echo "stack=$INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Auto-detección por archivos del repo
          if ls *.sln 2>/dev/null || find . -name "*.csproj" | head -1 | grep -q .; then
            echo "stack=dotnet" >> $GITHUB_OUTPUT
          elif [ -f "composer.json" ]; then
            echo "stack=laravel" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "stack=node" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "stack=go" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "stack=python" >> $GITHUB_OUTPUT
          else
            echo "stack=generic" >> $GITHUB_OUTPUT
          fi

  pr_agent:
    needs: detect_stack
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    name: AI Code Review (${{ needs.detect_stack.outputs.stack }})
    steps:
      - name: Build stack-specific instructions
        id: instructions
        run: |
          STACK="${{ needs.detect_stack.outputs.stack }}"
          case "$STACK" in
            dotnet)
              REVIEW_INSTRUCTIONS="Revisa siguiendo Clean Architecture con .NET 8. Valida: uso correcto de MediatR (CQRS), Autofac modules, EF Core (read/write separation), MassTransit para eventos de integración, y Ardalis.Specification para queries. Consulta CLAUDE.md para contexto de arquitectura."
              IMPROVE_INSTRUCTIONS="Sugiere mejoras alineadas con .NET 8 best practices, Clean Architecture y CQRS. Prioriza: bugs, seguridad, rendimiento, mantenibilidad."
              ;;
            laravel)
              REVIEW_INSTRUCTIONS="Revisa siguiendo las best practices de Laravel 11. Valida: Eloquent, middleware, Form Requests, Service pattern, y políticas de autorización. Consulta CLAUDE.md para contexto."
              IMPROVE_INSTRUCTIONS="Sugiere mejoras alineadas con Laravel 11 best practices. Prioriza: bugs, seguridad, rendimiento."
              ;;
            node)
              REVIEW_INSTRUCTIONS="Revisa siguiendo best practices de Node.js/TypeScript. Valida: manejo de errores async, tipos correctos, y patrones del proyecto. Consulta CLAUDE.md."
              IMPROVE_INSTRUCTIONS="Sugiere mejoras para Node.js/TypeScript. Prioriza: type safety, async correctness, seguridad."
              ;;
            *)
              REVIEW_INSTRUCTIONS="Revisa el código priorizando seguridad, rendimiento y mantenibilidad. Consulta CLAUDE.md para contexto de arquitectura."
              IMPROVE_INSTRUCTIONS="Sugiere mejoras priorizando bugs, seguridad, rendimiento y mantenibilidad."
              ;;
          esac
          echo "review=$REVIEW_INSTRUCTIONS" >> $GITHUB_OUTPUT
          echo "improve=$IMPROVE_INSTRUCTIONS" >> $GITHUB_OUTPUT

      - name: PR Agent
        uses: Codium-ai/pr-agent@v0.32
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          config.response_language: "es"
          config.model: "anthropic/claude-sonnet-4-5-20250929"
          config.model_turbo: "anthropic/claude-haiku-4-5-20251001"
          config.fallback_models: '["anthropic/claude-sonnet-4-5-20250929"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          pr_description.publish_description_as_comment: "true"
          pr_description.generate_ai_title: "true"
          pr_description.enable_pr_type: "true"
          pr_description.enable_semantic_files_types: "true"
          pr_description.enable_pr_diagram: "true"
          pr_description.collapsible_file_list: "adaptive"
          pr_description.add_original_user_description: "true"
          pr_description.publish_labels: "true"
          pr_description.enable_large_pr_handling: "true"
          pr_reviewer.require_focused_review: "true"
          pr_reviewer.require_score_review: "true"
          pr_reviewer.require_estimate_effort_to_review: "true"
          pr_reviewer.extra_instructions: ${{ steps.instructions.outputs.review }}
          pr_code_suggestions.commitable_code_suggestions: "true"
          pr_code_suggestions.dual_publishing_score_threshold: "5"
          pr_code_suggestions.num_code_suggestions_per_chunk: "4"
          pr_code_suggestions.max_number_of_calls: "3"
          pr_code_suggestions.focus_only_on_problems: "true"
          pr_code_suggestions.persistent_comment: "true"
          pr_code_suggestions.suggestions_score_threshold: "3"
          pr_code_suggestions.extra_instructions: ${{ steps.instructions.outputs.improve }}
