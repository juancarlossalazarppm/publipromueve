name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      language:
        description: 'Tech stack del proyecto (auto-detect si se omite)'
        required: false
        type: string
        default: 'auto'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Detectar stack
  # ─────────────────────────────────────────────
  detect_stack:
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect tech stack
        id: detect
        run: |
          INPUT="${{ inputs.language }}"
          if [ "$INPUT" != "auto" ]; then
            echo "stack=$INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ls *.sln 2>/dev/null || find . -name "*.csproj" | head -1 | grep -q .; then
            echo "stack=dotnet" >> $GITHUB_OUTPUT
          elif [ -f "composer.json" ]; then
            echo "stack=laravel" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "stack=node" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            echo "stack=go" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "stack=python" >> $GITHUB_OUTPUT
          else
            echo "stack=generic" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # Job 2: Review con contexto completo
  # Se ejecuta al abrir/actualizar un PR
  # ─────────────────────────────────────────────
  ai_review:
    needs: detect_stack
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    name: AI Code Review (${{ needs.detect_stack.outputs.stack }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic PyGithub requests

      - name: Download review script
        run: |
          curl -sf \
            https://raw.githubusercontent.com/juancarlossalazarppm/publipromueve/main/.github/scripts/ai_review.py \
            -o /tmp/ai_review.py

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STACK: ${{ needs.detect_stack.outputs.stack }}
          REPO_NAME: ${{ github.repository }}
          REPO_SLUG: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python /tmp/ai_review.py

  # ─────────────────────────────────────────────
  # Job 3: Acumular aprendizajes al mergear PR
  # ─────────────────────────────────────────────
  accumulate_learning:
    needs: detect_stack
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    name: Accumulate Learnings
    steps:
      - name: Checkout publipromueve
        uses: actions/checkout@v4
        with:
          repository: juancarlossalazarppm/publipromueve
          token: ${{ secrets.PUBLIPROMUEVE_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic PyGithub

      - name: Run accumulate learning script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          REPO_SLUG: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python .github/scripts/accumulate_learning.py

      - name: Commit learnings to publipromueve
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "projects/${{ github.event.repository.name }}.md"
          git diff --cached --quiet || git commit -m "chore: learnings from ${{ github.repository }}#${{ github.event.pull_request.number }}"
          git push
